name: Backend CD — Deploy a Fly.io

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

jobs:
  # ── Verificar que el CI pasó (si fue disparado por workflow_run) ─
  check-ci:
    name: Verificar CI exitoso
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI pasó o fue push directo a main — procediendo con deploy"

  # ── Deploy api-gateway ──────────────────────────────────────────
  deploy-api-gateway:
    name: Deploy api-gateway
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: ./api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy auth-service ─────────────────────────────────────────
  deploy-auth-service:
    name: Deploy auth-service
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: ./auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy chat-service ─────────────────────────────────────────
  deploy-chat-service:
    name: Deploy chat-service
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: ./chat-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy profile-service ──────────────────────────────────────
  deploy-profile-service:
    name: Deploy profile-service
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: ./profile-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy social-service ───────────────────────────────────────
  deploy-social-service:
    name: Deploy social-service
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: ./social-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
