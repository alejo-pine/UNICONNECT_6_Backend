# ============================================================
# Volúmenes nombrados
# ============================================================
# Uno por servicio para preservar node_modules instalados dentro
# del contenedor (evita conflictos de binarios nativos entre host
# Windows/Mac y el contenedor Linux Alpine).
# expo_cache persiste el caché de Expo entre reinicios del contenedor.
volumes:
  gateway_nm:
    name: uc_gateway_node_modules
  auth_nm:
    name: uc_auth_node_modules
  profile_nm:
    name: uc_profile_node_modules
  social_nm:
    name: uc_social_node_modules
  chat_nm:
    name: uc_chat_node_modules
  dashboard_nm:
    name: uc_dashboard_node_modules
  mobile_nm:
    name: uc_mobile_node_modules
  expo_cache:
    name: uc_expo_cache

# ============================================================
# Red compartida
# ============================================================
networks:
  uniconnect_net:
    name: uniconnect_dev_network
    driver: bridge
