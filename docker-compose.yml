# ============================================================
# UniConnect — Docker Compose para desarrollo local
# ============================================================
# Uso:
#   docker compose up --build        Levanta todo desde cero
#   docker compose up api-gateway    Solo el gateway
#   docker compose logs -f           Logs en tiempo real
#
# Prerrequisitos:
#   - Cada servicio tiene su propio .env con credenciales de Supabase.
#   - NO se levanta ningún contenedor de base de datos local;
#     todos los servicios se conectan a Supabase Cloud.
#   - Cada microservicio necesita un Dockerfile.dev (ver TAREA 2).
# ============================================================

services:

  # ──────────────────────────────────────────────
  # API Gateway  —  puerto host: 3000
  # ──────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    container_name: uc_api_gateway
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    environment:
      # Sobrescribe las URLs de los servicios para que usen los nombres
      # de servicio de Docker en lugar de localhost.
      PORT: "3000"
      AUTH_SERVICE_URL: "http://auth-service:3001"
      PROFILE_SERVICE_URL: "http://profile-service:3002"
      SOCIAL_SERVICE_URL: "http://social-service:3003"
      CHAT_SERVICE_URL: "http://chat-service:3004"
      # Necesario en Docker Desktop (Windows/Mac): inotify no propaga
      # eventos de cambio de archivos en bind mounts; polling es el fallback.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./api-gateway/src:/app/src      # hot-reload: bind mount RW (tsx watch)
      - gateway_nm:/app/node_modules    # volumen nombrado — node_modules del contenedor
    depends_on:
      - auth-service
      - profile-service
      - social-service
      - chat-service
    networks:
      - uniconnect_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Auth Service  —  puerto host: 3001
  # ──────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile.dev
    container_name: uc_auth_service
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    environment:
      PORT: "3001"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./auth-service/src:/app/src
      - auth_nm:/app/node_modules
    networks:
      - uniconnect_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Profile Service  —  puerto host: 3002
  # ──────────────────────────────────────────────
  profile-service:
    build:
      context: ./profile-service
      dockerfile: Dockerfile.dev
    container_name: uc_profile_service
    ports:
      - "3002:3002"
    env_file:
      - ./profile-service/.env
    environment:
      PORT: "3002"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./profile-service/src:/app/src
      - profile_nm:/app/node_modules
    networks:
      - uniconnect_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Social Service  —  puerto host: 3003
  # ──────────────────────────────────────────────
  social-service:
    build:
      context: ./social-service
      dockerfile: Dockerfile.dev
    container_name: uc_social_service
    ports:
      - "3003:3003"
    env_file:
      - ./social-service/.env
    environment:
      PORT: "3003"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./social-service/src:/app/src
      - social_nm:/app/node_modules
    networks:
      - uniconnect_net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Chat Service  —  puerto host: 3004
  # ──────────────────────────────────────────────
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile.dev
    container_name: uc_chat_service
    ports:
      - "3004:3004"
    env_file:
      - ./chat-service/.env
    environment:
      PORT: "3004"
      # El frontend accede al chat directamente (WebSocket), por eso
      # también escucha en el host en su puerto original.
      CORS_ORIGIN: "http://localhost:5173,http://localhost:8081,http://localhost:19006"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./chat-service/src:/app/src
      - chat_nm:/app/node_modules
    networks:
      - uniconnect_net
    restart: unless-stopped

